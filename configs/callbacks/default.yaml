defaults:
  - model_checkpoint
#  - early_stopping
#  - model_summary
  - rich_progress_bar
  - add_metric_aggs
  - log_val_predictions_segmentation
  - _self_

add_metric_aggs:
  _target_: src.callbacks.wandb_callbacks.AddMetricAggs
  metrics: ["val/loss", "val/auprc", "val/f1", "val/auroc", "val/r2"]
  aggs: ["min", "max", "max", "max", "max"]

log_val_predictions_segmentation:
  num_samples: 8
  every_n_epochs: 10

model_checkpoint:
  dirpath: ${paths.output_dir}/checkpoints
  filename: "epoch_{epoch:03d}"
  monitor: "val/loss"
  mode: "min"
  save_last: True
  auto_insert_metric_name: False
  every_n_epochs: 1
  save_top_k: 1
