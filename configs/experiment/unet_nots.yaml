# @package _global_

# to execute this experiment run:
# python train.py experiment=example

defaults:
  - override /model: seasfire_unet
  - override /data: seasfire_local_global_generic_unet
  - override /callbacks: default
  - override /trainer: default

data:
  local_lag: 1
  global_lag: 1
  input_local_shape: [10, 1, 80, 80]
  num_workers: 16
  pin_memory: true
  debug: false
  patch_local_shape: [10, 1, 16, 16]
  patch_global_shape: [10, 1, 30, 30]
  posemb_path: ''
  posemb_global_path: ''
  posemb_var_name: ''
  # posemb_path: ${posemb_path}
  # posemb_global_path: ${posemb_global_path}
  # posemb_var_name: ${posemb_var_name}

